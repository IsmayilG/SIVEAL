<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIVEAL Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f172a;
            font-family: 'Inter', sans-serif;
            color: white;
            min-height: 100vh;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }

        .admin-title {
            color: #60a5fa;
            font-size: 2rem;
            font-weight: 600;
        }

        .logout-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .admin-layout {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
        }

        .admin-panel {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #334155;
        }

        .panel-title {
            margin-bottom: 20px;
            color: #60a5fa;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            font-family: 'Inter';
            outline: none;
        }

        input:focus,
        textarea:focus {
            border-color: #60a5fa;
        }

        button {
            padding: 12px 24px;
            background: #60a5fa;
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: #374151;
            color: white;
        }

        .status {
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
            min-height: 20px;
        }

        .success {
            color: #4ade80;
        }

        .error {
            color: #f87171;
        }

        .articles-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .article-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .article-item h4 {
            color: #60a5fa;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .article-meta {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .article-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        .btn-edit {
            background: #f59e0b;
            color: black;
        }

        .btn-delete {
            background: #dc2626;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            border-bottom: 1px solid #334155;
        }

        .modal-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            padding: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #60a5fa;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .recent-articles {
            max-height: 300px;
            overflow-y: auto;
        }

        .recent-article-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .recent-article-item h5 {
            color: #60a5fa;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }

        .recent-article-meta {
            color: #94a3b8;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .admin-layout {
                grid-template-columns: 1fr;
            }

            .admin-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1 class="admin-title">SIVEAL Admin Panel</h1>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>

        <div class="admin-layout">
            <div class="admin-panel">
                <h2 class="panel-title">Dashboard</h2>
                <div class="stats-grid" id="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="total-articles">0</div>
                        <div class="stat-label">Total Articles</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="total-views">0</div>
                        <div class="stat-label">Total Views</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="top-category">N/A</div>
                        <div class="stat-label">Top Category</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="avg-views">0</div>
                        <div class="stat-label">Avg Views/Article</div>
                    </div>
                </div>

                <h3 style="margin-top: 30px; margin-bottom: 15px;">Recent Articles</h3>
                <div class="recent-articles" id="recent-articles">
                </div>
            </div>

            <div class="admin-panel">
                <h2 class="panel-title" id="form-title">Add New Article</h2>
                <form id="newsForm">
                    <input type="hidden" id="article-id">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="title" required>
                    </div>

                    <div class="form-group">
                        <label>Category</label>
                        <select id="category">
                            <option value="AI & Robotics">AI & Robotics</option>
                            <option value="Crypto">Crypto</option>
                            <option value="Enterprise">Enterprise</option>
                            <option value="Science">Science</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Image URL</label>
                        <input type="url" id="image" placeholder="https://..." required>
                    </div>

                    <div class="form-group">
                        <label>Summary</label>
                        <textarea id="summary" rows="4" required></textarea>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button type="submit" id="submit-btn">Publish Article</button>
                        <button type="button" class="btn-secondary" id="cancel-btn" style="display: none;">Cancel</button>
                    </div>
                    <div id="status" class="status"></div>
                </form>
            </div>
        </div>

        <div class="admin-panel" style="margin-top: 30px;">
            <h2 class="panel-title">Manage Articles</h2>
            <div class="articles-list" id="articles-list">
            </div>
        </div>
    </div>

    <div id="delete-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Confirm Delete</h3>
                <button class="modal-close" id="delete-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this article? This action cannot be undone.</p>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button id="confirm-delete" class="btn-delete">Delete</button>
                    <button id="cancel-delete" class="btn-secondary">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
